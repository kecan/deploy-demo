version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deploy-demo-app
    ports:
      - "4000:4000"
    volumes:
      # 持久化数据库
      - todo-data:/app/server/data
    environment:
      - NODE_ENV=production
      - PORT=4000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  todo-data:
